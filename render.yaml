{
  "$schema": "https://render.com/schema/render.yaml",
  "services": [
    {
      "type": "web",
      "runtime": "python",
      "name": "graduate-api",
      "buildCommand": "pip install -r requirements.txt && python manage.py collectstatic --noinput",
      "startCommand": "python manage.py migrate && python manage.py setup_admin; gunicorn config.wsgi --bind 0.0.0.0:$PORT",
      "envVars": [
        {"key": "SECRET_KEY", "generateValue": true},
        {"key": "DJANGO_SETTINGS_MODULE", "value": "config.settings"},
        {"key": "PYTHON_VERSION", "value": "3.11.7"},
        {"key": "CORS_ALLOW_ALL", "value": "true"},
        {"key": "DEBUG", "value": "false"}
      ]
    }
  ]
}
