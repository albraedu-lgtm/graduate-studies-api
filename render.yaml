{
  "$schema": "https://render.com/schema/render.yaml",
  "services": [
    {
      "type": "web",
      "runtime": "python",
      "name": "graduate-api",
      "buildCommand": "pip install -r requirements.txt",
      "startCommand": "gunicorn config.wsgi",
      "envVars": [
        {"key": "SECRET_KEY", "generateValue": true},
        {"key": "DJANGO_SETTINGS_MODULE", "value": "config.settings"},
        {"key": "DATABASE_URL", "fromDatabase": {"name": "graduate-db", "property": "connectionString"}}
      ]
    }
  ],
  "databases": [
    {"name": "graduate-db", "plan": "free"}
  ]
}
